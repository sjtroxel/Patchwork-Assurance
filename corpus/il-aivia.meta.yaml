  - "Illinois AI Video Interview Act"
  - "820 ILCS 42"
status: effective
signed_date: 2019-08-09
effective_dates:
  - { date: 2020-01-01, applies_to: "Sections 1, 5, 10, 15 — notice/consent disclosure, sharing limits, and 30-day destruction on request (P.A. 101-260)" }
  - { date: 2022-01-01, applies_to: "Section 20 — annual race/ethnicity demographic-data reporting for AI-only screening decisions (added by P.A. 102-47)" }
operative_standard: 'AIVIA is a NOTICE / CONSENT / RETENTION statute, NOT a discrimination-effect or decision-influence law — do not harmonize it with any operative term in the corpus. Its trigger is a specific narrow practice, not a decision-influence or effect threshold: it applies only where an employer (1) asks applicants to record video interviews AND (2) uses an "artificial intelligence analysis" of those applicant-submitted videos, for positions based in Illinois (§ 5). When triggered, the employer must, before the interview: (a) notify the applicant that AI may be used to analyze the video and assess fitness, (b) provide information explaining how the AI works and what general types of characteristics it uses to evaluate applicants, and (c) obtain the applicant''s consent; an employer may not evaluate an applicant who has not consented (§ 5). It further limits sharing of applicant videos to persons whose expertise or technology is necessary to evaluate fitness (§ 10), and requires deletion of an applicant''s videos (and instruction to downstream recipients to delete, including backups) within 30 days of an applicant''s request (§ 15). A separate, narrower duty (§ 20) applies ONLY to an employer that relies SOLELY on AI analysis of a video interview to decide whether to grant an in-person interview: annual race/ethnicity demographic-data reporting to the Department of Commerce and Economic Opportunity. Critically, do NOT harmonize AIVIA with Illinois HB 3773 (`il-hb3773`): HB 3773 is an effect-based employment-discrimination prohibition under the Human Rights Act; AIVIA is a procedural notice/consent/retention rule for one hiring technology and creates no discrimination standard. The Act does not itself define "artificial intelligence" (unlike HB 3773, which does).'
regulated_tech_term: '"Artificial intelligence analysis" of applicant-submitted video interviews. The Act regulates the practice (AI analysis of video interviews to evaluate an applicant''s fitness) and, unlike Illinois HB 3773, does NOT supply a statutory definition of "artificial intelligence." § 20 separately reaches an employer that relies "solely upon an artificial intelligence analysis of a video interview" to decide on an in-person interview.'
regulated_roles: [deployer]
scope_domains: [employment]
enforcement_authority: "No enforcement agency or penalty is specified in the Act (it is silent on enforcement). For § 20 only, the Department of Commerce and Economic Opportunity (DCEO) receives the annual demographic-data reports, analyzes them, and reports to the Governor and General Assembly by July 1 each year whether the data discloses racial bias in the use of artificial intelligence."
enforcement_mechanism: "The statute contains no express enforcement provision, civil penalty, or stated private right of action; it is silent as to remedies. Its only reporting machinery is in § 20: an employer that relies solely on AI analysis of a video interview to decide on an in-person interview must collect and report race/ethnicity data to DCEO annually by December 31 (covering the 12-month period ending November 30), and DCEO reports to the Governor and General Assembly by July 1 whether the data shows racial bias. No AG-exclusive clause and no fine schedule appear in the Act."
cure_period: null
