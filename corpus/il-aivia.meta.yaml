short_name: IL AIVIA (820 ILCS 42)
law_name: "Artificial Intelligence Video Interview Act"
citation: "820 ILCS 42/1 et seq. (P.A. 101-260, eff. 1-1-20; § 20 added by P.A. 102-47, eff. 1-1-22)"
also_known_as:
