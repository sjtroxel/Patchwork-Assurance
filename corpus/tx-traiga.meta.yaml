law_id: tx-traiga
jurisdiction: Texas
short_name: TX TRAIGA (HB 149)
law_name: "Texas Responsible Artificial Intelligence Governance Act"
citation: "Tex. Bus. & Com. Code §§ 551.001 to 554.103 (Subtitle D; H.B. 149, 89th Leg., R.S., 2025)"
also_known_as: ["TRAIGA", "TRAIGA 2.0", "Texas Responsible AI Governance Act", "HB 149"]
status: effective
signed_date: 2025-06-22
effective_dates:
  - { date: 2026-01-01, applies_to: "entire Act (Subtitle D, Chapters 551-554); no phase-in" }
operative_standard: 'TRAIGA is NOT a consequential-decision / decision-influence statute and has no ADMT trigger — do not harmonize it with Colorado "materially influence", Connecticut "substantial factor", or California''s "significant decision" ADMT test, and do not harmonize its discrimination provision with the effect-based tests of New Jersey (N.J.A.C. 13:16) or Illinois HB 3773. This is the ENACTED, pared-back law ("TRAIGA 2.0"); the broad private-sector duty-stack of the introduced bill ("1.0") — impact assessments, risk-management policies, private-deployer disclosure — was REMOVED before passage and is not law. The Act applies to any person who does business in, serves residents of, or develops/deploys an AI system in Texas (§ 551.002), but imposes almost no affirmative private-sector compliance obligations. Its private-actor rule is a single INTENT-BASED prohibition: a person may not develop or deploy an AI system "with the intent to unlawfully discriminate against a protected class in violation of state or federal law" (§ 552.056(b)), and — expressly the opposite pole from NJ/IL — "a disparate impact is not sufficient by itself to demonstrate an intent to discriminate" (§ 552.056(c)). Affirmative disclosure duties fall only on governmental agencies and health-care providers (§ 552.051). The remaining prohibitions are narrow harmful-use bans (behavioral manipulation toward self-harm/crime § 552.052; government social scoring § 552.053; government biometric identification § 552.054; unconstitutional-infringement § 552.055; AI-generated CSAM / non-consensual deepfake sexual content § 552.057). Insurance entities are carved out of § 552.056 (§ 552.056(d); insurance is left to the Department of Insurance, § 552.002(2)); a federally insured financial institution that complies with banking law is deemed compliant (§ 552.056(e)).'
regulated_tech_term: '"Artificial intelligence system" — any machine-based system that, for any explicit or implicit objective, infers from the inputs it receives how to generate outputs, including content, decisions, predictions, or recommendations, that can influence physical or virtual environments (§ 551.001(1)). Broad, and not limited to automated decision-making about people.'
regulated_roles: [developer, deployer]
scope_domains: [employment, housing, financial_lending, insurance, health_care, education, government_services]
enforcement_authority: "Texas Attorney General (exclusive civil enforcement, § 552.101(a)); a state licensing agency may impose sanctions on a person it licenses only after an AG finding of violation and an AG recommendation (§ 552.106)"
enforcement_mechanism: "AG-only civil enforcement (§ 552.101(a)); NO private right of action (§ 552.101(b)). Complaint intake via an AG online mechanism (§ 552.102) and civil investigative demand (§ 552.103). Written notice with a 60-day right to cure before suit (§ 552.104). Civil penalties: $10,000-$12,000 per curable violation, $80,000-$200,000 per uncurable violation, $2,000-$40,000 per day for a continuing violation (§ 552.105). A rebuttable presumption of reasonable care, and a safe harbor for substantial compliance with the NIST AI Risk Management Framework (Generative AI Profile) or a comparable framework (§ 552.105(c),(e)). No penalty for an AI system not yet deployed (§ 552.105(f)). Licensing-agency sanctions up to $100,000 only after an AG finding (§ 552.106)."
cure_period: "60 days to cure after the AG's written notice of violation (§ 552.104(b))"
private_right_of_action: false
key_obligations:
  - { section: "Tex. Bus. & Com. Code § 551.002", label: "Applicability: reaches any person who promotes/advertises/does business in Texas, produces a product or service used by Texas residents, or develops or deploys an AI system in Texas" }
  - { section: "Tex. Bus. & Com. Code § 552.051", label: "Disclosure to consumers: a GOVERNMENTAL AGENCY (and a health-care provider using AI in a service or treatment) must disclose AI interaction, clearly and in plain language; does NOT impose a disclosure duty on private employers ('consumer' excludes the employment/commercial context, § 551.001(2))" }
  - { section: "Tex. Bus. & Com. Code § 552.052", label: "Prohibited use: may not develop/deploy an AI system that intentionally aims to incite or encourage self-harm, harm to others, or criminal activity" }
  - { section: "Tex. Bus. & Com. Code § 552.053", label: "Prohibited use (government): a governmental entity may not use AI for social scoring producing detrimental or rights-infringing treatment" }
  - { section: "Tex. Bus. & Com. Code § 552.054", label: "Prohibited use (government): a governmental entity may not use AI for biometric identification that would infringe a person's constitutional or statutory rights" }
  - { section: "Tex. Bus. & Com. Code § 552.056", label: "Unlawful discrimination: may not develop/deploy AI WITH INTENT to unlawfully discriminate against a protected class (race, color, national origin, sex, age, religion, disability); a disparate impact alone is NOT sufficient to show intent (§ 552.056(c)); insurance-entity and federally-insured-financial-institution carve-outs apply" }
  - { section: "Tex. Bus. & Com. Code § 552.057", label: "Prohibited use: may not develop/distribute AI whose sole intent is to produce unlawful sexual deepfakes or child sexual abuse material, or that impersonates a child in sexual text conversations" }
  - { section: "Tex. Bus. & Com. Code § 552.101", label: "Enforcement: AG has exclusive authority; there is NO private right of action" }
  - { section: "Tex. Bus. & Com. Code § 552.104", label: "Notice and 60-day cure before any AG action; cure plus a written cured-statement bars suit" }
  - { section: "Tex. Bus. & Com. Code § 552.105", label: "Civil penalties and injunction; rebuttable presumption of reasonable care; NIST AI-RMF safe harbor for substantial compliance" }
