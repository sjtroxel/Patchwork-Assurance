law_id: nj-njdpa
jurisdiction: New Jersey
short_name: NJ NJDPA (Data Privacy Act)
law_name: "New Jersey Data Privacy Act (An Act concerning online services, consumers, and personal data), P.L. 2023, c.266"
citation: "N.J.S.A. 56:8-166.4 to 56:8-166.19 (P.L. 2023, c.266; S332), as amended by A5017 (2026); scoped to the profiling / automated-decision provisions §§ 56:8-166.4 (definitions, excerpt), 166.6, 166.8, 166.10, 166.11, 166.12. Other NJDPA sections (166.5 applicability thresholds, 166.7 verified-request timelines, 166.9 waiver, 166.13 exemptions, 166.14 controller non-obligations, 166.15 controller-processor contracts, 166.16 respective obligations, 166.17-166.19 enforcement) omitted as out of the automated-decision scope."
also_known_as:
  - "NJDPA"
  - "New Jersey Data Privacy Act"
  - "New Jersey Data Protection Act"
  - "P.L. 2023, c.266 (S332)"
status: effective
signed_date: 2024-01-16
effective_dates:
  - { date: 2025-01-15, applies_to: "NJDPA takes effect (the 365th day following enactment, § 17) — full statute in force, including the profiling opt-out (§ 166.10) and controller profiling-disclosure duty (§ 166.6(b))" }
  - { date: 2026-01-20, applies_to: "A5017 amendment (effective immediately): added data-/entity-level exemptions (§ 166.13) and expanded the de-identified-data definition (§ 166.4) — does NOT alter the profiling/opt-out provisions modeled here" }
operative_standard: 'A consumer-privacy regime, NOT a discrimination-liability rule and NOT a tech decision-influence trigger — do NOT harmonize with Colorado "materially influence" (ADMT, co-sb26-189), Connecticut SB 5 "substantial factor" (AERDT, ct-sb5-pa26-15), California CCPA "ADMT / significant decision" (ca-ccpa-admt), and — critically — do NOT conflate this with New Jersey''s OTHER in-corpus law, the DCR disparate-impact rules N.J.A.C. 13:16 (nj-njac-13-16), which is an effect-based EMPLOYMENT discrimination framework. NJDPA is the CONSUMER-PRIVACY profiling opt-out, a sibling of Colorado CPA (co-cpa) and Connecticut CTDPA (ct-ctdpa). The automated-decision hook is NJDPA''s PROFILING OPT-OUT: a consumer has the right to opt out of "profiling in furtherance of decisions that produce legal or similarly significant effects concerning the consumer" (§ 56:8-166.10(a)(5)(c)). Like Colorado CPA and UNLIKE Connecticut CTDPA, NJDPA uses NO "solely/any automated" qualifier — the trigger is the nature of the DECISION, not the degree of automation. Also like Colorado CPA and unlike CTDPA, NJDPA DEFINES the effect term: "Decisions that produce legal or similarly significant effects concerning the consumer" (§ 166.4) = decisions that result in the provision or denial of financial or lending services, housing, insurance, education enrollment or opportunity, criminal justice, employment opportunities, health care services, or access to essential goods and services. "Profiling" (§ 166.4) = "any form of automated processing performed on personal data to evaluate, analyze, or predict personal aspects related to an identified or identifiable individual''s economic situation, health, personal preferences, interests, reliability, behavior, location, or movements." The duties bind the CONTROLLER; the "consumer" (§ 166.4) excludes a person acting in a commercial or employment context — so NJDPA does NOT reach employee/applicant screening (that is N.J.A.C. 13:16''s domain in New Jersey). Beyond the bare opt-out, the controller must clearly and conspicuously disclose profiling-for-significant-decisions and how to opt out (§ 166.6(b)), may not discriminate against a consumer for opting out (§ 166.8), must (when such technology exists) honor a universal opt-out mechanism for such profiling (§ 166.11), and must conduct a data-protection assessment before profiling that presents a "heightened risk" — expressly including profiling with a reasonably foreseeable risk of unlawful disparate impact (§ 166.12(a)(9), (c)(1)).'
regulated_tech_term: "Profiling (§ 56:8-166.4) — any form of automated processing of personal data to evaluate, analyze, or predict personal aspects of an individual. The regulated automated-decision activity is profiling in furtherance of decisions that produce legal or similarly significant effects concerning the consumer (§ 56:8-166.10(a)(5)(c)); the effect term is itself defined in § 166.4."
regulated_roles: [deployer]  # NJDPA uses controller/processor terminology; the profiling opt-out + disclosure + assessment duties fall on the CONTROLLER, mapped to 'deployer' in this taxonomy (the party that uses profiling). Processors (§ 166.16) act on a controller's behalf and are not directly subject to the opt-out.
scope_domains: [financial_lending, housing, insurance, health_care, education]  # the consumer-facing 'legal or similarly significant effect' domains from § 166.4 that map to the corpus taxonomy; the full statutory list also names criminal justice, employment opportunities, and essential goods/services. NOT modeled as employment: NJDPA's 'consumer' definition excludes the employment/commercial context (NJ employment ADM is N.J.A.C. 13:16's domain, nj-njac-13-16)
enforcement_authority: "New Jersey Attorney General (Office of the Attorney General), with the Division of Consumer Affairs in the Department of Law and Public Safety administering notices/complaints"
enforcement_mechanism: "A violation is an unlawful practice under the New Jersey Consumer Fraud Act, P.L. 1960, c.39 (C.56:8-1 et seq.) (§ 56:8-166.17(a)). The Office of the Attorney General has SOLE and EXCLUSIVE authority to enforce; there is NO private right of action (§ 56:8-166.19). During the period ending on the first day of the 18th month following the effective date (i.e. through approximately mid-2026), the Division of Consumer Affairs must, where a cure is deemed possible, issue notice and allow a 30-day cure before an enforcement action may be brought (§ 56:8-166.17(b)); after that window the cure opportunity is no longer guaranteed."
cure_period: "30-day right to cure after Division of Consumer Affairs notice, available only until the first day of the 18th month following the effective date (§ 56:8-166.17(b)) — i.e. roughly mid-2026; not guaranteed thereafter. VERIFY exact sunset date against § 166.17(b)."
private_right_of_action: false
key_obligations:
  - { section: "56:8-166.4", label: "Definitions — 'profiling' (any form of automated processing to evaluate/analyze/predict personal aspects), 'decisions that produce legal or similarly significant effects concerning the consumer' (DEFINED: financial/lending, housing, insurance, education, criminal justice, employment opportunities, health care, essential goods/services), 'consumer' (excludes commercial/employment context), 'controller'" }
  - { section: "56:8-166.6", label: "Controller must clearly and conspicuously disclose profiling in furtherance of decisions that produce legal or similarly significant effects, and the manner in which a consumer may exercise the right to opt out (§ 166.6(b)); plus the privacy-notice contents (§ 166.6(a))" }
  - { section: "56:8-166.8", label: "Controller may not discriminate against a consumer for choosing to opt out of profiling in furtherance of decisions that produce legal or similarly significant effects (or of sale / targeted advertising)" }
  - { section: "56:8-166.10", label: "Consumer right to opt out of profiling in furtherance of decisions that produce legal or similarly significant effects concerning the consumer (§ 166.10(a)(5)(c)); plus access, correction, deletion, and portability rights" }
  - { section: "56:8-166.11", label: "Controller must honor an authorized agent's opt-out and, when such technology exists, a user-selected universal opt-out mechanism reaching profiling-for-significant-decisions (§ 166.11)" }
  - { section: "56:8-166.12", label: "Controller must conduct and document a data-protection assessment before processing that presents a 'heightened risk of harm', expressly including profiling that presents a reasonably foreseeable risk of unlawful disparate impact (§ 166.12(a)(9), (c)(1)); also consent required to profile a known 13-16-year-old (§ 166.12(a)(7))" }
