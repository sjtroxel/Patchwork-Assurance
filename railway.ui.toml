# Railway config-as-code — Streamlit UI service.
#
# Point the UI service at this file: UI service > Settings > Config-as-code > "railway.ui.toml".
# Same repo, same Railpack build as the backend; only the start command and env differ.
#
# Env to set on THIS service (Variables tab) — holds NO secrets, only where the backend lives:
#   API_BASE_URL=https://<the-live-backend-origin>     (the FastAPI service's public URL)
#
# Streamlit binds 0.0.0.0:$PORT (Railway injects PORT), headless (no "open browser" prompt).
# Health endpoint /_stcore/health returns "ok" once the server is up.

[build]
builder = "RAILPACK"

[deploy]
# `python -m streamlit` so it resolves in Railpack's Python env (the venv bin/ is not on PATH for a
# custom start command, so bare `streamlit` would be "command not found" — same as the api service).
startCommand = "python -m streamlit run src/patchwork_assurance/ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
