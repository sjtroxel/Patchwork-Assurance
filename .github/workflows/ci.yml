name: CI

# Runs only when Python code/config changes. Before Phase 0 creates these paths, no
# commit touches them, so CI never fires on the docs-only repo (no failing runs). The
# commit that adds pyproject.toml + src/ + tests/ triggers the first real run.
on:
  push:
    branches: [main]
    paths: [pyproject.toml, "src/**", "tests/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main]
    paths: [pyproject.toml, "src/**", "tests/**", ".github/workflows/ci.yml"]

jobs:
  ci:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Test (pytest)
        run: pytest
