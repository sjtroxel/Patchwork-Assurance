# Streamlit theme — Patchwork Assurance identity (Phase 4.5 · M4, palette C "Cinematic Jewel").
# Keys verified against Streamlit 1.58 at build (theme_util.py). Fonts load the Track-A faces
# directly via the theme using the "Family Name:source_url" form (1.58 native), so the app and
# the landing page share Bricolage Grotesque (headings) + Work Sans (body) with no CSS hack.
[theme]
base = "light"
primaryColor = "#2f4b5e"               # anchor teal
backgroundColor = "#f3ece1"            # quilt-backing paper
secondaryBackgroundColor = "#ece2d3"   # warm cream (sidebar, widgets, code)
textColor = "#15191e"                  # ink
linkColor = "#7c2f3b"                  # oxblood accent
borderColor = "#d9cdb8"                # cream-tan, matches the landing card border
font = "Work Sans:https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600&display=swap"
headingFont = "Bricolage Grotesque:https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&display=swap"

# Dark variant of the quilt brand (Phase 11, "Deep Ink Navy" — chosen via see-it-to-pick-it). The
# top-level [theme] above stays the light default unchanged; this sub-table only overrides colors for
# dark mode (fonts inherit). Background is darker than the fixed hero gradient (#2f4b5e -> #21304c) so
# the hero floats forward. Light stays the default; the user toggles via the built-in selector.
[theme.dark]
base = "dark"
primaryColor = "#6f93a6"               # lifted teal, reads on dark
backgroundColor = "#111a26"            # deep ink navy
secondaryBackgroundColor = "#1b2736"   # panels: expander headers, widgets, code, dataframes
textColor = "#f3ece1"                  # the brand paper-cream, now as text (continuity)
linkColor = "#e0b659"                  # lifted gold accent (the hero eyebrow color)
borderColor = "#2f3d52"

[client]
# "viewer" keeps the main (⋮) menu but hides developer options (Deploy, Rerun, Clear cache). Phase 11:
# the Light/Dark/Auto theme selector lives in that menu in 2026 Streamlit, so dark mode needs it
# reachable — "minimal" hides the menu entirely (and with it the theme toggle), so it can't be used here.
toolbarMode = "viewer"
