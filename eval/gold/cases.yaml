- id: nyc-developer-only
  rationale: >
    A vendor that builds and sells an AEDT but does not itself use it to screen candidates or
    employees. NYC Local Law 144 places its obligations on the employer or employment agency that
    USES the tool (the deployer), not on the vendor that builds it, so LL144 does not reach a
    developer-only business. Mirror of the Illinois and Colorado developer-exclusion logic
