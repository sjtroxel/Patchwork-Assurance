# Patchwork Assurance — gold evaluation set
#
# Hand-authored cases with known-correct answers, used by the Phase 6 eval harness.
# See eval/gold/README.md for the schema and how to verify each case.
#
# Two kinds of expected answer, with different sources of truth:
#   - expect.scope        : the CORRECT OUTPUT of the deterministic scope screen
#                           (core/scope.py applicable_laws) given the corpus metadata.
#                           Mechanical and verifiable by reading scope.py + the .meta.yaml —
#                           NO legal judgment is needed to check these.
#   - grounding_sections  : statute sections that should ground an in-scope answer
#   + obligations           (retrieved / cited). Grounded in the actual statute text in
#                           corpus/*.md — verifiable by reading the cited section.
#
# Scope verdict values are the real InScope literals: "yes" | "no" | "uncertain".
# They are QUOTED on purpose: unquoted yes/no are YAML booleans (True/False), but the
# scope screen returns the strings "yes"/"no" — quoting keeps the comparison string-vs-string.
# Law ids: co-sb26-189 (Colorado), ct-sb5-pa26-15 (Connecticut), il-hb3773 (Illinois),
#          nyc-ll144 (New York City — non-state jurisdiction, AEDT bias-audit law),
#          ca-feha-ads (California — FEHA automated-decision-system employment regs, 2 CCR 11008 et seq.),
#          ca-ccpa-admt (California — CPPA automated-decisionmaking-technology privacy regs, 11 CCR 7200 et seq.).
#
# Coverage matrix (each case exercises a distinct branch of scope.py / grounding path):
#    1 co-employment-deployer       CO yes / CT no  / IL no   baseline; CT/IL excluded by no nexus
#    2 ct-employment-deployer       CO no  / CT yes / IL no   baseline, other law
#    3 multistate-employment        CO yes / CT yes / IL no   the headline out-of-state nexus case
#    4 colorado-based-employer      CO yes / CT no  / IL no   home_state auto-nexus branch
#    5 ct-resident-housing          CO no  / CT no  / IL no   CT law is employment-only (CT domain mismatch)
#    6 co-employment-role-unknown   CO unc / CT no  / IL no   uncertain via blank ROLE
#    7 no-ai-in-decisions           CO no  / CT no  / IL no   ai_use="no" affirmative-exclusion short-circuit
#    8 no-regulating-nexus          CO no  / CT no  / IL no   reaches no state in corpus (jurisdiction mismatch)
#    9 multistate-developer         CO yes / CT yes / IL no   DEVELOPER role -> different grounding (CO 1702, CT Sec.8)
#                                                             IL no: IL regulates employers-as-deployers, not developers
#   10 co-employment-ai-unsure      CO yes / CT no  / IL no   ai_use="unsure" (tool-inventory memo branch)
#   11 location-unknown             CO unc / CT unc / IL unc  uncertain via blank JURISDICTION (no nexus stated)
#   12 ct-ai-companion              CO no  / CT yes / IL no   CT-only domain -> CO/IL domain mismatch (mirror of #5)
#   13 domain-unknown               CO unc / CT no  / IL no   uncertain via blank DOMAIN
#   14 ct-mixed-domains             CO no  / CT yes / IL no   MIXED domains: one matches (employment), one
#                                                             doesn't (housing) -> any-match suffices
#   15 il-employment-deployer       CO no  / CT no  / IL yes  baseline IL in-scope case
#   16 il-tristate-employment       CO yes / CT no  / IL yes  IL + CO multistate: two laws simultaneously
#   17 il-home-state                CO no  / CT no  / IL yes  home_state=Illinois auto-nexus branch
#   18 il-domain-mismatch           CO no  / CT no  / IL no   IL employment-only: housing domain = no (mirror of #5)
#   19 nyc-employment-deployer      CO no / CT no / IL no / NYC yes   baseline NYC AEDT in-scope case
#   20 nyc-multistate-employment    CO no / CT no / IL yes / NYC yes  NYC + Illinois: two laws at once (non-state + state)
#   21 nyc-developer-only           CO no / CT no / IL no / NYC no    AEDT vendor (developer) not regulated by LL144
#   22 nyc-domain-mismatch          CO no / CT no / IL no / NYC no    LL144 employment-only: housing domain = no
#   23 ca-employment-deployer       CA yes / others no               baseline CA ADS in-scope case
#   24 ca-multistate-employment     CA yes / IL yes / others no       CA + Illinois: two laws at once
#   25 ca-home-state                CA yes / others no               home_state=California auto-nexus branch
#   26 ca-developer-only            CA no  / others no               build-only ADS vendor not regulated (not an agent)
#   27 ca-domain-mismatch           CA-FEHA no / CA-CPPA no          gov-services: neither CA regime covers it
#   28 ca-ccpa-housing-deployer     CA-FEHA no / CA-CPPA yes          intra-CA split: CPPA reaches housing, FEHA doesn't
#   29 ca-ccpa-lending-deployer     CA-FEHA no / CA-CPPA yes          standalone CPPA (lending = significant decision)
#
# NYC/CA note: cases 1-18 also assert nyc-ll144: "no" (none has a New York City nexus); every case
# (1-22) likewise asserts ca-feha-ads: "no" AND ca-ccpa-admt: "no" (none has a California nexus). The one
# exception for all three is case 11 (location-unknown), where a blank jurisdiction makes every law
# "uncertain". The two CA regimes have DIFFERENT domain reach: FEHA ADS = employment only; CPPA ADMT =
# any "significant decision" (financial/lending, housing, education, employment, healthcare) — so a CA
# case can be CPPA-yes / FEHA-no (cases 28, 29).
#
# Verdict-vs-grounding note: developer/deployer and ai_use yes/unsure do NOT change the scope VERDICT
# (the role gate only tests membership; "unsure" only annotates). They earn their place because they
# change GROUNDING/obligations (developer sections differ) and the memo's next-steps — i.e. they exercise
# the retrieval-hit-rate and memo metrics, not scope-accuracy. The three "uncertain via blank X" cases
# (6, 11, 13) cover all three blank elements so a refactor of the gate/blanks logic can't slip through.

- id: co-employment-deployer
  rationale: >
    A business with Colorado employees/applicants that uses AI to help make employment
    decisions, acting as the deployer. Colorado SB 26-189 covers employment as a
    consequential-decision domain and regulates deployers, so it is facially in scope.
    No Connecticut nexus, so Connecticut's law does not reach this business.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1704"   # point-of-interaction notice
      - "6-1-1705"   # human review / reconsideration
    obligations:
      - "Before using a covered ADMT to materially influence a consequential decision, give the consumer a clear and conspicuous notice that a covered ADMT is in use (Colorado 6-1-1704(1))."
      - "On an adverse outcome, on request provide the consumer an opportunity for meaningful human review and reconsideration, plus instructions to correct inaccurate personal data (Colorado 6-1-1705(1))."

- id: ct-employment-deployer
  rationale: >
    A business with Connecticut employees/applicants using an automated employment-related
    decision technology (AERDT) as the deployer. Connecticut PA 26-15 regulates AERDT in
    employment decisions and regulates deployers, so it is in scope. No Colorado nexus.
  situation:
    jurisdictions: [Connecticut]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "yes"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "Sec. 9"    # interaction disclosure to employee/applicant
      - "Sec. 10"   # pre-decision written notice
    obligations:
      - "Disclose to each employee or applicant who interacts with the AERDT, in plain language, that they are interacting with such technology, unless it would be obvious to a reasonable person (Connecticut Sec. 9). Applies to AERDT deployed on or after Oct 1, 2027."
      - "Before the employment-related decision is made, give the employee or applicant a written notice stating that an AERDT was deployed, its purpose and the nature of the decision, its trade name, the categories and sources of personal data it analyzes, and the deployer's contact information (Connecticut Sec. 10). Applies to AERDT deployed on or after Oct 1, 2027."

- id: multistate-employment
  rationale: >
    The headline nexus case. An out-of-state business (home state Indiana, which regulates
    nothing here) that makes AI-assisted employment decisions about both Colorado and
    Connecticut workers. Reach follows the people, not the headquarters, so BOTH laws apply.
  situation:
    home_state: Indiana
    jurisdictions: [Colorado, Connecticut]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "yes"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      # Union of both laws' employment-deployer sections. The harness retrieves PER in-scope
      # jurisdiction (mirroring the memo path's per-law filtered retrieve), so each law is
      # scored against its own sections — see eval/gold/README.md.
      - "6-1-1704"
      - "6-1-1705"
      - "Sec. 9"
      - "Sec. 10"
    obligations:
      - "Colorado: point-of-interaction notice (6-1-1704) and the human-review/correction rights (6-1-1705)."
      - "Connecticut: interaction disclosure (Sec. 9) and pre-decision written notice (Sec. 10), for AERDT deployed on or after Oct 1, 2027."

- id: colorado-based-employer
  rationale: >
    A Colorado-headquartered business that did not separately list Colorado as a nexus state.
    Its home state IS a regulating jurisdiction, so the screen auto-counts a Colorado nexus
    (a Colorado business obviously has Colorado people). Tests the home_state auto-nexus branch.
    Same verdict as case 1 but reached through a different code path.
  situation:
    home_state: Colorado
    jurisdictions: []
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1704"
      - "6-1-1705"
    obligations:
      - "Same Colorado deployer duties as case co-employment-deployer (6-1-1704 notice; 6-1-1705 human review)."

- id: ct-resident-housing
  rationale: >
    A business making AI-assisted HOUSING decisions about Connecticut residents. Connecticut's
    AI law (PA 26-15) regulates AERDT in EMPLOYMENT decisions only; it does not reach housing,
    so it is out of scope here despite the Connecticut nexus. Colorado does cover housing, but
    only with a Colorado nexus, which this business lacks. The honest answer is: neither law in
    this corpus reaches this situation. A false "yes" here would be the worst kind of failure.
  situation:
    jurisdictions: [Connecticut]
    decision_domains: [housing]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"       # no Colorado nexus
      ct-sb5-pa26-15: "no"    # Connecticut's AI law does not cover housing
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []  # out of scope for both — nothing to ground
    obligations: []

- id: co-employment-role-unknown
  rationale: >
    Colorado employment nexus and AI use are clear, but the business has not said whether it is
    a developer or a deployer (role left blank). Under the default CAUTIOUS policy, a blank on a
    necessary element returns "uncertain" rather than a false "no" — the screen says "you could
    be in scope, but tell me your role." Tests the uncertain (silence) path.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [employment]
    roles: []
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "uncertain"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      # An uncertain law is still retrieved and explained by the memo (in_scope in {yes, uncertain}).
      - "6-1-1704"
      - "6-1-1705"
    obligations:
      - "If the business is a deployer, the Colorado deployer duties apply (6-1-1704 notice; 6-1-1705 human review). Role must be confirmed before scope is settled."

- id: no-ai-in-decisions
  rationale: >
    A business with Colorado employees that has affirmatively said it does NOT use AI to make or
    influence the relevant decisions. Both laws only bite AI-driven decisions, so this is a clean
    "no" regardless of nexus, domain, or role. Tests the ai_use="no" short-circuit.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "no"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: no-regulating-nexus
  rationale: >
    A Texas business whose employees, applicants, and customers are all in Texas. Texas is not a
    regulating jurisdiction in this corpus, so there is no Colorado or Connecticut nexus and
    neither law reaches the business. Tests the jurisdiction-mismatch "no" (distinct from the
    ai_use="no" path).
  situation:
    home_state: Texas
    jurisdictions: [Texas]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: multistate-developer
  rationale: >
    The developer counterpart to the multistate case. An out-of-state company that BUILDS an
    automated employment-decision tool used on Colorado and Connecticut workers, acting as the
    developer. Both laws regulate developers, so both are in scope — but the developer's duties
    live in DIFFERENT sections than the deployer's, so this is the case that checks the developer
    grounding is retrievable. Same verdict as multistate-employment, different obligations.
  situation:
    home_state: Indiana
    jurisdictions: [Colorado, Connecticut]
    decision_domains: [employment]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "yes"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1702"   # CO developer documentation duty
      - "Sec. 8"     # CT developer info-to-deployer duty
    obligations:
      - "Colorado: a developer must make available to each deployer documentation covering the ADMT's intended and known harmful uses, training-data categories, known limitations and risks, instructions for human review, and the information the deployer needs to comply with 6-1-1704 (Colorado 6-1-1702, on or after Jan 1, 2027)."
      - "Connecticut: a developer must provide the deployer all information the deployer needs to perform its Sec. 9 and Sec. 10 duties (Connecticut Sec. 8), for AERDT deployed on or after Oct 1, 2027."

- id: co-employment-ai-unsure
  rationale: >
    A Colorado employer that uses some automated tools but is not sure which of them count as AI
    in its hiring decisions (ai_use = "unsure"). "unsure" does NOT change the verdict — Colorado is
    still in scope — but it does flip on the memo's tool-inventory next step ("list the tools that
    score/rank/screen people first"). This case exists to exercise that memo branch, not the screen.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "unsure"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1704"
      - "6-1-1705"
    obligations:
      - "Same Colorado deployer duties as case co-employment-deployer (6-1-1704 notice; 6-1-1705 human review). Because the business is unsure which tools use AI, the memo should first prompt a tool inventory before the obligations apply."

- id: location-unknown
  rationale: >
    The business described its AI use, domain, and role, but gave no location at all (no nexus
    states, no home state). The screen cannot confirm OR exclude either law, so both come back
    "uncertain" — the honest "you haven't told me where your people are" answer, not a false no.
    Tests the uncertain path via a blank JURISDICTION (case 6 tests blank role; case 13 blank domain).
  situation:
    jurisdictions: []
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "uncertain"
      ct-sb5-pa26-15: "uncertain"
      il-hb3773: "uncertain"
      nyc-ll144: "uncertain"
      ca-feha-ads: "uncertain"
      ca-ccpa-admt: "uncertain"
    grounding_sections:
      # Both laws are uncertain, so both are retrieved/explained (in_scope in {yes, uncertain}).
      # Scored per in-scope jurisdiction, as in case multistate-employment.
      - "6-1-1704"
      - "6-1-1705"
      - "Sec. 9"
      - "Sec. 10"
    obligations:
      - "Neither law can be confirmed until the business says which states its employees/applicants are in. If a Colorado or Connecticut nexus exists, the respective deployer duties apply."

- id: ct-ai-companion
  rationale: >
    A company that operates an AI companion product reaching both Colorado and Connecticut users.
    Connecticut regulates AI companions (Sec. 4-6); Colorado's law does NOT list ai_companion as a
    covered domain, so Colorado is out by domain mismatch even though there is a Colorado nexus.
    This is the mirror image of ct-resident-housing (there CT lacked the domain; here CO does). It
    also exercises the product-domain path. Note: "deployer" is the closest available form-role for
    a companion "operator" — a deliberate coarse mapping in the model, not a precise statutory term.
  situation:
    jurisdictions: [Colorado, Connecticut]
    decision_domains: [ai_companion]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"        # ai_companion is not a Colorado covered domain
      ct-sb5-pa26-15: "yes"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "Sec. 5"   # AI companion operator: safety protocol + human-disclosure duties
    obligations:
      - "Connecticut: an AI-companion operator must maintain a safety protocol (detect risk of suicide/self-harm, refer users to the 988 Lifeline, prevent the companion from claiming to be human) and clearly disclose to users that they are interacting with an AI companion (Connecticut Sec. 5, effective Jan 1, 2027)."

- id: domain-unknown
  rationale: >
    A Colorado employer (clear nexus and role) that has not said what kind of decision the AI
    touches (decision_domains blank). Colorado therefore comes back "uncertain" — could be a covered
    consequential decision, but the decision type is needed to confirm. Connecticut is a clean "no"
    (no Connecticut nexus). Tests the uncertain path via a blank DOMAIN.
  situation:
    jurisdictions: [Colorado]
    decision_domains: []
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "uncertain"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1704"
      - "6-1-1705"
    obligations:
      - "Colorado could reach this business, but the covered decision type must be confirmed first. If the AI touches a consequential decision (employment, housing, lending, insurance, health care, education, or government services), the deployer duties (6-1-1704 notice; 6-1-1705 human review) apply."

- id: ct-mixed-domains
  rationale: >
    A Connecticut employer that uses AI in TWO decision types at once: employment (which Connecticut
    covers) and housing (which it does not). Connecticut is still in scope, because a single matching
    domain is enough — the screen does NOT require every listed domain to be covered. This pins the
    "any-match" semantics of the domain gate (set intersection is non-empty, not equal): if the gate
    were ever changed to require ALL listed domains to match, this case would catch it. Connecticut
    reaches the employment AI; the housing use simply falls outside Connecticut's AI law. No Colorado
    nexus, so Colorado is out.
  situation:
    jurisdictions: [Connecticut]
    decision_domains: [employment, housing]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"        # no Colorado nexus
      ct-sb5-pa26-15: "yes"    # in scope via employment; housing is not CT-covered but doesn't defeat scope
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      # Only the employment sections — the part of this business CT actually reaches.
      - "Sec. 9"
      - "Sec. 10"
    obligations:
      - "Connecticut's employment notice duties (Sec. 9 interaction disclosure; Sec. 10 pre-decision written notice, for AERDT deployed on or after Oct 1, 2027) apply to the employment AI. The housing use is outside Connecticut's AI law (PA 26-15 covers AI in employment, not housing)."

- id: il-employment-deployer
  rationale: >
    The baseline Illinois case. A business with Illinois employees or applicants that uses AI
    to make or assist employment decisions, acting as an employer (deployer in this corpus
    taxonomy). Illinois HB 3773 prohibits AI use that has the discriminatory effect of
    subjecting employees to discrimination based on protected classes, and requires notice to
    employees. No Colorado or Connecticut nexus, so neither of those laws reaches this business.
  situation:
    jurisdictions: [Illinois]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "yes"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "775 ILCS 5/2-102"   # civil rights violation — prohibition + notice
    obligations:
      - "Prohibition: do not use AI in recruitment, hiring, promotion, renewal, training, discharge, discipline, tenure, or terms/conditions of employment in a way that has the effect of discriminating against employees based on protected classes, or that uses zip codes as a proxy for protected classes (Illinois 775 ILCS 5/2-102(L)(1))."
      - "Notice: provide employees notice that AI is being used for those purposes (Illinois 775 ILCS 5/2-102(L)(2)). IDHR rulemaking on notice specifics is pending as of 2026."

- id: il-tristate-employment
  rationale: >
    An out-of-state company (home state Ohio) making AI-assisted employment decisions about
    workers in both Illinois and Colorado. Both laws reach this company because both states have
    people it makes AI-driven decisions about. Tests the IL+CO combination: the scope engine
    handles them independently. Connecticut is out (no Connecticut nexus).
  situation:
    home_state: Ohio
    jurisdictions: [Illinois, Colorado]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      ct-sb5-pa26-15: "no"
      il-hb3773: "yes"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "6-1-1704"           # CO point-of-interaction notice
      - "6-1-1705"           # CO human review / reconsideration
      - "775 ILCS 5/2-102"   # IL civil rights violation — prohibition + notice
    obligations:
      - "Colorado: point-of-interaction notice (6-1-1704) and human review / correction rights on an adverse outcome (6-1-1705), effective Jan 1, 2027."
      - "Illinois: do not use AI with discriminatory effect in covered employment decisions (775 ILCS 5/2-102(L)(1)); notify employees of AI use (775 ILCS 5/2-102(L)(2)), effective Jan 1, 2026."

- id: il-home-state
  rationale: >
    An Illinois-headquartered employer that did not separately list Illinois as a nexus state.
    The scope engine auto-adds the home state when it is a regulating jurisdiction (an Illinois
    employer obviously has Illinois employees). Tests the home_state auto-nexus branch for IL,
    mirroring case 4 (colorado-based-employer) for a different state. No CO or CT nexus.
  situation:
    home_state: Illinois
    jurisdictions: []
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "yes"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "775 ILCS 5/2-102"
    obligations:
      - "Same Illinois deployer duties as case il-employment-deployer (discrimination prohibition 775 ILCS 5/2-102(L)(1); employee notice 775 ILCS 5/2-102(L)(2))."

- id: il-domain-mismatch
  rationale: >
    A business making AI-assisted HOUSING decisions about Illinois residents. Illinois HB 3773
    covers only EMPLOYMENT decisions (it amends the Illinois Human Rights Act's employment
    civil rights provisions). Housing is outside Illinois's scope in this corpus, so IL does
    not reach this business despite the Illinois nexus. Colorado covers housing, but only with
    a Colorado nexus, which this business lacks. This is the IL mirror of case 5
    (ct-resident-housing): a false "yes" here would assert obligations the law does not impose.
  situation:
    jurisdictions: [Illinois]
    decision_domains: [housing]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"       # no Colorado nexus
      ct-sb5-pa26-15: "no"    # no Connecticut nexus
      il-hb3773: "no"         # Illinois HB 3773 covers employment, not housing
      nyc-ll144: "no"         # no New York City nexus
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: nyc-employment-deployer
  rationale: >
    The baseline New York City case. A business that uses an automated employment decision tool
    (AEDT) to screen New York City candidates or employees, acting as the employer (a deployer in
    this corpus taxonomy). NYC Local Law 144 reaches employers and employment agencies that use
    AEDTs for covered employment decisions, so it is facially in scope. No Colorado, Connecticut, or
    Illinois nexus, so none of those laws reach this business. NYC is a non-state jurisdiction
    included for its scale — its AEDT bias-audit law sits naturally beside the state laws.
  situation:
    jurisdictions: [New York City]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "yes"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "20-871"   # bias-audit, publication, and notice requirements
    obligations:
      - "Bias audit: ensure the AEDT has had an independent bias audit within the prior year before using it to screen NYC candidates or employees (NYC 20-871(a)(1))."
      - "Publication and notice: publish a summary of the most recent bias-audit results on the employer/agency website, and notify each NYC candidate/employee at least ten business days before use, including the job qualifications and characteristics the tool assesses and the chance to request an alternative selection process (NYC 20-871(a)(2), (b))."

- id: nyc-multistate-employment
  rationale: >
    An out-of-state company (home state Ohio) making AEDT-assisted employment decisions about
    workers in both New York City and Illinois. Both laws reach this company because each has
    people it screens with AI. Tests the NYC + state combination, handled independently — the
    headline "non-state jurisdiction alongside a state law" case. Colorado and Connecticut are out
    (no nexus).
  situation:
    home_state: Ohio
    jurisdictions: [New York City, Illinois]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "yes"
      nyc-ll144: "yes"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections:
      - "20-871"             # NYC bias-audit + notice
      - "775 ILCS 5/2-102"   # IL civil rights violation — prohibition + notice
    obligations:
      - "New York City: bias audit within the prior year, publish the audit summary, and give candidates/employees at least ten business days' notice before using the AEDT (NYC 20-871)."
      - "Illinois: do not use AI with discriminatory effect in covered employment decisions and notify employees of AI use (775 ILCS 5/2-102(L))."

- id: nyc-developer-only
  rationale: >
    A vendor that builds and sells an AEDT but does not itself use it to screen candidates or
    employees. NYC Local Law 144 places its obligations on the employer or employment agency that
    USES the tool (the deployer), not on the vendor that builds it, so LL144 does not reach a
    developer-only business. Mirror of the Illinois and Colorado developer-exclusion logic
    (here both IL and NYC exclude the developer-only role).
  situation:
    jurisdictions: [New York City]
    decision_domains: [employment]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: nyc-domain-mismatch
  rationale: >
    A business making AI-assisted HOUSING decisions about New York City residents. NYC Local Law
    144 is an employment-only law (it governs AEDTs used to screen candidates for employment or
    employees for promotion), so a housing use falls outside its scope. A false "yes" here would
    assert obligations the law does not impose. Mirror of the CT and IL domain-mismatch cases.
  situation:
    jurisdictions: [New York City]
    decision_domains: [housing]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"         # LL144 covers employment, not housing
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: ca-employment-deployer
  rationale: >
    The baseline California case. A business with California employees or applicants that uses an
    automated-decision system (ADS) to make or assist employment decisions, acting as the employer
    (a deployer in this corpus taxonomy). California's Civil Rights Council ADS regulations (2 CCR
    §§ 11008 et seq.) extend FEHA discrimination liability to ADS use in employment, so the business
    is facially in scope. No Colorado, Connecticut, Illinois, or New York City nexus, so none of those
    laws reach it.
  situation:
    jurisdictions: [California]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "yes"
      ca-ccpa-admt: "yes"
    grounding_sections:
      - "11009"   # unlawful to use an ADS / selection criteria that discriminates
      - "11013"   # four-year recordkeeping of automated-decision-system data
    obligations:
      - "Prohibition: do not use an automated-decision system or selection criteria (including a qualification standard, employment test, or proxy) that discriminates against applicants or employees on a basis protected by the FEHA; evidence, or the absence, of anti-bias testing is relevant to any available defense (California 2 CCR 11009(f))."
      - "Recordkeeping: preserve automated-decision-system data, selection criteria, and related employment records for four years (California 2 CCR 11013(c))."

- id: ca-multistate-employment
  rationale: >
    An out-of-state company (home state Ohio) making AI-assisted employment decisions about workers in
    both California and Illinois. Both laws reach it because each state has people it screens with AI.
    Tests the California + state combination, handled independently. Colorado, Connecticut, and New York
    City are out (no nexus).
  situation:
    home_state: Ohio
    jurisdictions: [California, Illinois]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "yes"
      nyc-ll144: "no"
      ca-feha-ads: "yes"
      ca-ccpa-admt: "yes"
    grounding_sections:
      - "11009"              # CA unlawful ADS use
      - "11013"              # CA recordkeeping
      - "775 ILCS 5/2-102"   # IL civil rights violation — prohibition + notice
    obligations:
      - "California: do not use an ADS that discriminates on a protected basis (2 CCR 11009(f)); retain ADS data and selection criteria for four years (2 CCR 11013(c))."
      - "Illinois: do not use AI with discriminatory effect in covered employment decisions and notify employees of AI use (775 ILCS 5/2-102(L))."

- id: ca-home-state
  rationale: >
    A California-headquartered employer that did not separately list California as a nexus state. The
    scope engine auto-adds the home state when it is a regulating jurisdiction (a California employer
    obviously has California employees). Tests the home_state auto-nexus branch for California, mirroring
    case colorado-based-employer and il-home-state. No CO, CT, IL, or NYC nexus.
  situation:
    home_state: California
    jurisdictions: []
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "yes"
      ca-ccpa-admt: "yes"
    grounding_sections:
      - "11009"
      - "11013"
    obligations:
      - "Same California deployer duties as case ca-employment-deployer (ADS non-discrimination 2 CCR 11009(f); four-year ADS recordkeeping 2 CCR 11013(c))."

- id: ca-developer-only
  rationale: >
    A vendor that builds and sells an automated-decision system but does not itself use it to make
    employment decisions. California's ADS regulations place their duties on the employer or other
    covered entity that USES the tool (the deployer); a developer is reached only when it acts as an
    "agent" performing covered employer functions (§ 11008(b)), which a build-and-sell-only vendor does
    not. So the regulations do not reach a developer-only business. Mirror of the Illinois and NYC
    developer-exclusion logic; note California, unlike Colorado and Connecticut, imposes no standalone
    developer duty.
  situation:
    jurisdictions: [California]
    decision_domains: [employment]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
    grounding_sections: []
    obligations: []

- id: ca-domain-mismatch
  rationale: >
    A business making AI-assisted GOVERNMENT-SERVICES decisions about California residents. Neither
    California law reaches it: the FEHA ADS regulations cover employment only, and the CPPA ADMT
    regulations' "significant decision" list is a closed set (financial/lending, housing, education,
    employment, healthcare) that does NOT include government services. So both CA laws are out despite
    the California nexus. A false "yes" here would assert obligations neither regulation imposes.
    Mirror of the CT, IL, and NYC domain-mismatch cases, now spanning both CA regimes.
  situation:
    jurisdictions: [California]
    decision_domains: [government_services]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"         # FEHA ADS regs cover employment, not government services
      ca-ccpa-admt: "no"        # government services is not a CCPA "significant decision"
    grounding_sections: []
    obligations: []

- id: ca-ccpa-housing-deployer
  rationale: >
    The intra-California split case. A business that uses ADMT to make AI-assisted HOUSING decisions
    about California residents, acting as the deployer. California's TWO regimes diverge here: the FEHA
    ADS regulations cover employment only (out), but the CPPA ADMT regulations reach HOUSING because it
    is a "significant decision" (financial/lending, housing, education, employment, or healthcare). So
    CPPA is in scope and FEHA is not — the same state, two laws, different domain reach. No CO/CT/IL/NYC
    nexus.
  situation:
    jurisdictions: [California]
    decision_domains: [housing]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"         # FEHA ADS regs cover employment, not housing
      ca-ccpa-admt: "yes"       # CPPA: housing is a "significant decision"
    grounding_sections:
      - "7200"   # using ADMT to make a significant decision triggers the Article
      - "7221"   # right to opt out of ADMT for a significant decision
    obligations:
      - "Pre-use notice: provide consumers a Pre-use Notice describing the ADMT use and their rights to opt out of and access the ADMT (California 11 CCR 7220), in compliance by Jan 1, 2027 (11 CCR 7200(b))."
      - "Opt-out and access: provide the ability to opt out of ADMT used for the housing decision (11 CCR 7221) and, on request, plain-language access to the ADMT's purpose, output, and how it was used (11 CCR 7222); conduct a risk assessment before using the ADMT (11 CCR 7150(b)(3))."

- id: ca-ccpa-lending-deployer
  rationale: >
    A lender that uses ADMT to make AI-assisted FINANCIAL/LENDING decisions about California consumers.
    Lending is a CPPA "significant decision", so the CPPA ADMT regulations are in scope; the FEHA ADS
    regulations (employment only) are not. A clean standalone CPPA case in a domain none of the other
    corpus laws touch, exercising the consumer-privacy regime on its own.
  situation:
    jurisdictions: [California]
    decision_domains: [financial_lending]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      ct-sb5-pa26-15: "no"
      il-hb3773: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"         # FEHA ADS regs cover employment, not lending
      ca-ccpa-admt: "yes"       # CPPA: financial/lending is a "significant decision"
    grounding_sections:
      - "7200"   # ADMT-for-significant-decision scope trigger
      - "7220"   # pre-use notice
    obligations:
      - "A business using ADMT to make a significant lending decision must give a Pre-use Notice (11 CCR 7220), honor opt-out (11 CCR 7221) and access (11 CCR 7222) requests, and conduct a risk assessment before use (11 CCR 7150(b)(3)); compliance required by Jan 1, 2027 (11 CCR 7200(b))."
