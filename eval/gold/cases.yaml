- id: il-domain-mismatch
  rationale: >
    A business making AI-assisted HOUSING decisions about Illinois residents. Illinois HB 3773
    covers only EMPLOYMENT decisions (it amends the Illinois Human Rights Act's employment
    civil rights provisions). Housing is outside Illinois's scope in this corpus, so IL does
    not reach this business despite the Illinois nexus. Colorado covers housing, but only with
    a Colorado nexus, which this business lacks. This is the IL mirror of case 5
