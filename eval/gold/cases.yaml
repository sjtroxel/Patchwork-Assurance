- id: ct-ctdpa-lending-deployer
  rationale: >
    A lender that uses profiling to make AI-assisted FINANCIAL/LENDING decisions about Connecticut
    consumers, acting as the controller (deployer). The CTDPA profiling opt-out reaches "profiling in
    furtherance of any automated decision that produces a legal or similarly significant effect" (as
    amended by SB 1295 / P.A. 25-113, effective July 1, 2026), so CTDPA is in scope. Connecticut SB 5
    is NOT — it is employment-only, and CTDPA's "consumer" excludes the employment context, so the two
    Connecticut laws divide cleanly (SB 5 = employees/applicants; CTDPA = consumers).
  situation:
    jurisdictions: [Connecticut]
    decision_domains: [financial_lending]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"      # SB 5 is employment-only; a consumer-lending decision is outside it
      ct-ctdpa: "yes"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"
    grounding_sections:
      - "42-518"   # consumer right to opt out of profiling in furtherance of any automated decision
      - "42-520"   # controller duty to provide and honor the opt-out mechanism
      - "42-522"   # data protection / impact assessment for high-risk profiling
    obligations:
      - "Honor a consumer's request to opt out of profiling in furtherance of any automated decision that produces a legal or similarly significant effect concerning the consumer (Connecticut 42-518, as amended by SB 1295 effective July 1, 2026)."
      - "Provide one or more secure and reliable methods for consumers to submit requests to exercise their rights, including opt-out of profiling-based automated decisions (Connecticut 42-520)."
      - "Conduct and document a data protection assessment for profiling that presents a heightened risk of harm to consumers, and make it available to the Attorney General on request (Connecticut 42-522, effective August 1, 2026)."

- id: ct-ctdpa-developer-only
  rationale: >
    A vendor that only BUILDS profiling / automated-decision technology for Connecticut consumer
    contexts but does not itself determine the purpose and means of processing. CTDPA's profiling
    duties bind the CONTROLLER (mapped to deployer); a build-only vendor is not the controller, so
    CTDPA does not reach it. Mirror of nyc-developer-only / ca-developer-only for the privacy regime.
  situation:
    jurisdictions: [Connecticut]
    decision_domains: [financial_lending]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"            # CTDPA binds the controller/deployer, not a build-only vendor
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"

- id: ct-ctdpa-ca-multistate
  rationale: >
    A lender using profiling/ADMT for consumer lending decisions with BOTH Connecticut and California
    consumers. Two distinct consumer-privacy regimes apply at once: CTDPA (profiling opt-out) and the
    California CPPA ADMT rules (lending is a "significant decision"). The parallel to the multistate
    employment cases, but on the consumer-privacy axis.
  situation:
    jurisdictions: [Connecticut, California]
    decision_domains: [financial_lending]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "yes"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"         # FEHA ADS regs cover employment, not lending
      ca-ccpa-admt: "yes"       # CPPA: financial/lending is a "significant decision"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"
    grounding_sections:
      - "42-518"   # CTDPA consumer profiling opt-out
      - "42-520"   # CTDPA controller opt-out duty
      - "7200"     # CCPA ADMT-for-significant-decision scope trigger
      - "7220"     # CCPA pre-use notice
    obligations:
      - "Connecticut: honor a consumer's request to opt out of profiling in furtherance of any automated decision that produces a legal or similarly significant effect (Connecticut 42-518, as amended by SB 1295 effective July 1, 2026), and provide a method to submit that request (Connecticut 42-520)."
      - "California: a business using ADMT to make a significant lending decision must give a Pre-use Notice (11 CCR 7220), honor opt-out (11 CCR 7221) and access (11 CCR 7222) requests, and conduct a risk assessment before use (11 CCR 7150(b)(3)); compliance required by Jan 1, 2027 (11 CCR 7200(b))."

- id: co-cpa-lending-deployer
  rationale: >
    A lender using profiling to make AI-assisted consumer FINANCIAL/LENDING decisions about Colorado
    residents, as the controller (deployer). Two Colorado regimes apply at once: the Colorado AI Act
    (SB 26-189, materially-influencing a consequential decision) AND the Colorado Privacy Act's profiling
    opt-out (a decision producing a legal or similarly significant effect). Shows Colorado's two laws
    stacking on a consumer decision — the CO analogue of California's FEHA+CCPA and Connecticut's SB5+CTDPA.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [financial_lending]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      co-cpa: "yes"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"
    grounding_sections:
      - "6-1-1704"   # CO AI Act: point-of-interaction notice
      - "6-1-1705"   # CO AI Act: human review / reconsideration
      - "6-1-1306"   # CO CPA: consumer right to opt out of profiling
    obligations:
      - "Colorado AI Act: before using a covered ADMT to materially influence a consequential lending decision, give the consumer a clear notice that a covered ADMT is in use, and on an adverse outcome provide an opportunity for human review (Colorado 6-1-1704, 6-1-1705)."
      - "Colorado Privacy Act: honor a consumer's request to opt out of profiling in furtherance of decisions that produce legal or similarly significant effects, including through a user-selected universal opt-out mechanism (Colorado 6-1-1306)."

- id: co-cpa-developer-only
  rationale: >
    A vendor that only BUILDS profiling / automated-decision technology used in Colorado consumer
    contexts but does not determine the purpose and means of processing. The Colorado AI Act regulates
    developers, so SB 26-189 is in scope; the Colorado Privacy Act binds the CONTROLLER (deployer) only,
    so the CPA is not. Distinguishes the two Colorado regimes by regulated role.
  situation:
    jurisdictions: [Colorado]
    decision_domains: [financial_lending]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"
    grounding_sections:
      - "6-1-1702"   # CO AI Act: developer duties
    obligations:
      - "Colorado AI Act: a developer of a high-risk AI system must provide deployers the documentation needed to complete an impact assessment and to understand the system's reasonably foreseeable uses and known harms (Colorado 6-1-1702)."

- id: tx-employment-deployer
  rationale: >
    A Texas business using AI to help make employment decisions, acting as the deployer. Texas
    TRAIGA (HB 149) reaches any person who develops or deploys an AI system in Texas (Sec. 551.002)
    and prohibits deploying AI with intent to unlawfully discriminate against a protected class
    (Sec. 552.056), so it is in scope. Unlike Colorado/Connecticut it imposes NO impact-assessment,
    notice, or opt-out duty on a private employer — the memo's value is grounded reassurance plus the
    single narrow intent-based prohibition. No other state's nexus is present. (The enacted "TRAIGA
    2.0" — the broad introduced duty-stack was removed before passage; do not model it as one.)
  situation:
    home_state: Texas
    jurisdictions: [Texas]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "yes"
    grounding_sections:
      - "552.056"   # unlawful discrimination (intent-based; disparate impact insufficient)
      - "552.101"   # AG-exclusive enforcement; no private right of action
    obligations:
      - "Texas TRAIGA: do not develop or deploy an AI system with the intent to unlawfully discriminate against a protected class; a disparate impact alone is not sufficient to demonstrate intent (Texas 552.056)."
      - "Texas TRAIGA: the Act imposes no impact-assessment, consumer-notice, or opt-out duty on a private employer; it is enforced only by the Attorney General, with a 60-day cure period and no private right of action (Texas 552.101, 552.104)."

- id: tx-developer-only
  rationale: >
    A vendor that BUILDS an AI system provided in Texas, acting only as the developer. TRAIGA's core
    prohibitions bind a person who "develops OR deploys" (Sec. 552.056, 552.052) and Sec. 551.002
    reaches a developer in the state, so TRAIGA is in scope for a developer too — unlike NYC LL144 and
    NJ 13:16, which bind the deployer/covered entity, not the tool vendor. Tests that TRAIGA's
    developer reach differs from the deployer-only employment-audit laws.
  situation:
    home_state: Texas
    jurisdictions: [Texas]
    decision_domains: [employment]
    roles: [developer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "yes"
    grounding_sections:
      - "552.056"   # binds developers and deployers alike
    obligations:
      - "Texas TRAIGA: a developer may not develop an AI system with the intent to unlawfully discriminate against a protected class; the prohibition binds developers and deployers alike (Texas 552.056)."

- id: tx-co-multistate
  rationale: >
    An out-of-state company with employees/applicants in BOTH Texas and Colorado, using AI in
    employment decisions as the deployer. Two laws fire at once, and they are DIFFERENT shapes:
    Colorado SB 26-189 is a consequential-decision duty-stack (notice, human review), while Texas
    TRAIGA is an intent-based anti-discrimination prohibition with no affirmative duties — the
    "don't harmonize" contrast made concrete in a single memo.
  situation:
    home_state: Missouri
    jurisdictions: [Texas, Colorado]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "yes"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "yes"
    grounding_sections:
      - "6-1-1704"   # CO: point-of-interaction notice
      - "6-1-1705"   # CO: human review / reconsideration
      - "552.056"    # TX: intent-based discrimination prohibition
    obligations:
      - "Colorado AI Act: before using a covered ADMT to materially influence an employment decision, give the consumer clear notice that a covered ADMT is in use and, on an adverse outcome, an opportunity for human review (Colorado 6-1-1704, 6-1-1705)."
      - "Texas TRAIGA: do not deploy an AI system with the intent to unlawfully discriminate against a protected class; disparate impact alone is not sufficient, and no impact-assessment or notice duty applies (Texas 552.056)."

- id: il-aivia-video-interview
  rationale: >
    An Illinois employer that asks applicants to record video interviews and uses an AI analysis
    of those videos to evaluate them. Scope-gate-wise this is identical to the baseline Illinois
    employment/deployer case (Illinois + employment + deployer), so BOTH Illinois laws fire: HB 3773
    (effect-based discrimination + notice) and AIVIA (820 ILCS 42 — notice/consent/retention for the
    video-interview AI practice). The two are NOT harmonized: HB 3773 is a discrimination standard,
    AIVIA is a procedural notice/consent/deletion rule tied to the video-interview technology. This
    case exists to exercise the AIVIA grounding path (820 ILCS 42/5, 42/15); the deterministic gate
    cannot see AIVIA's narrower real-world trigger (that lives in the memo prose), so at the gate the
    verdict tracks HB 3773.

    NOTE (2026-07-16, Phase 14): `notes` carries the video-interview fact. It was added because the
    gate does not need that fact but a READER does — this case's situation was otherwise byte-identical
    to il-employment-deployer, so Phase 14's prose renderer (which is lossless over `situation` and
    nothing else) produced the same input for both cases and the AIVIA probe measured nothing. `notes`
    is ignored by scope.py and by the retrieval focus query (core/memo.py:217), so the deterministic
    scope and retrieval numbers are unaffected; it reaches the memo prompt only (core/prompts.py:104),
    symmetrically for every arm. Deliberately states the FACT and not the rule: no notice, consent, or
    retention language, which are the gold obligations the model has to reach on its own.
  situation:
    jurisdictions: [Illinois]
    decision_domains: [employment]
    roles: [deployer]
    ai_use: "yes"
    notes: >-
      As part of hiring we ask applicants to record video interviews, and we use AI to analyze
      those recordings to evaluate the applicants.
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "yes"
      il-aivia: "yes"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"
      nj-njdpa: "no"
      tx-traiga: "no"
    grounding_sections:
      - "820 ILCS 42/5"    # AIVIA: notice + explanation + consent before the interview
      - "820 ILCS 42/15"   # AIVIA: delete applicant videos within 30 days of request
    obligations:
      - "AIVIA notice/consent: before the interview, notify the applicant that AI may analyze the video, explain how the AI works and what general characteristics it evaluates, and obtain consent; you may not evaluate an applicant who has not consented (Illinois 820 ILCS 42/5)."
      - "AIVIA retention: on an applicant's request, delete the applicant's video interviews within 30 days and instruct any downstream recipients to delete their copies, including backups (Illinois 820 ILCS 42/15)."

- id: nj-njdpa-insurance-deployer
  rationale: >
    A New Jersey insurer that uses profiling to make AI-assisted consumer INSURANCE decisions, as the
    controller (deployer). Insurance is one of the "legal or similarly significant effect" domains NJDPA
    reaches, and — unlike NJ's OTHER law (N.J.A.C. 13:16, whose disparate-impact rules do not extend to
    insurance) — it isolates NJDPA: only the consumer-privacy profiling opt-out fires. This is the NJ
    analogue of the CO CPA and CT CTDPA lending cases, and it exercises the NJDPA grounding path
    (56:8-166.10 opt-out + 56:8-166.6 disclosure). Do NOT conflate NJDPA (consumer-privacy opt-out) with
    13:16 (effect-based employment/housing discrimination).
  situation:
    jurisdictions: [New Jersey]
    decision_domains: [insurance]
    roles: [deployer]
    ai_use: "yes"
  expect:
    scope:
      co-sb26-189: "no"
      co-cpa: "no"
      ct-sb5-pa26-15: "no"
      ct-ctdpa: "no"
      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"        # 13:16's disparate-impact domains do not include insurance
      nj-njdpa: "yes"
      tx-traiga: "no"
    grounding_sections:
      - "56:8-166.10"   # NJDPA: consumer right to opt out of profiling for significant-effect decisions
      - "56:8-166.6"    # NJDPA: controller duty to disclose such profiling + the opt-out method
    obligations:
      - "NJDPA opt-out: honor a New Jersey consumer's request to opt out of profiling in furtherance of decisions that produce legal or similarly significant effects (including an insurance decision), directly or through a universal opt-out mechanism where such technology exists (New Jersey 56:8-166.10, 56:8-166.11)."
      - "NJDPA disclosure: clearly and conspicuously disclose profiling in furtherance of such decisions and the manner in which a consumer may exercise the right to opt out (New Jersey 56:8-166.6(b)); do not discriminate against a consumer for opting out (56:8-166.8)."
