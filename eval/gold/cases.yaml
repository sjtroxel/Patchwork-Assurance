    with no New Jersey workforce of its own. N.J.A.C. 13:16 places the obligation on the covered
    entity that USES the tool (the deployer), not the developer — the rules even bar a covered
    entity from delegating compliance to the vendor (13:16-2.4(e)). So the build-only vendor is
    not itself in scope.
  situation:
    jurisdictions: [New Jersey]
    decision_domains: [employment]
    roles: [developer]
