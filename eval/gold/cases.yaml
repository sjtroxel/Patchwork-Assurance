      il-hb3773: "no"
      il-aivia: "no"
      nyc-ll144: "no"
      ca-feha-ads: "no"
      ca-ccpa-admt: "no"
      nj-njac-13-16: "no"        # 13:16 regulates the deployer/covered entity, not the tool vendor
      nj-njdpa: "no"
      tx-traiga: "no"            # no Texas nexus

