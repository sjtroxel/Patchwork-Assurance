<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Patchwork Assurance favicon — stitched pinwheel block with pieced corners (palette C: Cinematic Jewel) -->
  <!-- cream piecing -->
  <path d="M0 0 L32 32 L0 32 Z" fill="#f3ece1"/><path d="M32 0 L64 0 L32 32 Z" fill="#f3ece1"/>
  <path d="M64 32 L64 64 L32 32 Z" fill="#f3ece1"/><path d="M0 64 L32 64 L32 32 Z" fill="#f3ece1"/>
  <!-- pinwheel blades -->
  <path d="M0 0 L32 0 L32 32 Z" fill="#2f4b5e"/><path d="M64 0 L64 32 L32 32 Z" fill="#7c2f3b"/>
  <path d="M64 64 L32 64 L32 32 Z" fill="#2f6f5f"/><path d="M0 64 L0 32 L32 32 Z" fill="#d6a43e"/>
  <!-- pieced corner half-square triangles -->
  <path d="M0 32 L0 14 L14 32 Z" fill="#7c2f3b"/><path d="M32 0 L50 0 L32 14 Z" fill="#d6a43e"/>
  <path d="M64 32 L64 50 L50 32 Z" fill="#21304c"/><path d="M32 64 L14 64 L32 50 Z" fill="#2f4b5e"/>
  <!-- stitching -->
  <g stroke="#f3ece1" stroke-width="1.1" stroke-dasharray="2.4 2" fill="none" stroke-linecap="round">
    <path d="M2 2 L30 30"/><path d="M62 2 L34 30"/><path d="M62 62 L34 34"/><path d="M2 62 L30 34"/>
    <path d="M32 2 V62"/><path d="M2 32 H62"/>
  </g>
  <rect x="26" y="26" width="12" height="12" rx="2" fill="#21304c"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="5" fill="none" stroke="#f3ece1" stroke-width="1.1" stroke-dasharray="3 2.2"/>
</svg>
