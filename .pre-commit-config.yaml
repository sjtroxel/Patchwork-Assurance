# Python equivalent of the husky + lint-staged hook used in the prior (Node) repos.
# Enable once: `pip install pre-commit && pre-commit install`  (set up in Phase 0).
# Pin the ruff rev to match the ruff version in pyproject.toml at build time.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0 # verify/update at build time
    hooks:
      - id: ruff # lint
        args: [--fix]
      - id: ruff-format # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0 # verify/update at build time
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024] # block accidental commits of large binaries (e.g. statute PDFs)
